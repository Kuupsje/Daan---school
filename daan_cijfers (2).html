<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daan — 2 Havo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Daan Cijfers">
<meta name="theme-color" content="#0e6b7a">
<style>
:root {
  --bg:         #f0f4f7;
  --bg2:        #e4ecf1;
  --white:      #ffffff;
  --surface:    #ffffff;
  --surface2:   #f7f9fb;
  --petrol:     #0e6b7a;
  --petrol2:    #0a5564;
  --petrol3:    #094858;
  --petrol-lt:  #e0f0f3;
  --petrol-mid: #b3d8de;
  --teal:       #14b8c8;
  --teal-lt:    #e6f8fa;
  --border:     #dce6ea;
  --border2:    #c4d6dc;
  --text:       #0d2d35;
  --text2:      #4a7080;
  --text3:      #8aaab4;
  --green:      #059669;
  --green-lt:   #d1fae5;
  --amber:      #d97706;
  --amber-lt:   #fef3c7;
  --red:        #dc2626;
  --red-lt:     #fee2e2;
  --red-mid:    #fca5a5;
  --shadow-sm:  0 1px 3px rgba(14,107,122,.08), 0 1px 2px rgba(14,107,122,.04);
  --shadow:     0 4px 12px rgba(14,107,122,.10), 0 1px 4px rgba(14,107,122,.06);
  --r:          12px;
  --r-sm:       8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
}

header {
  background: var(--petrol);
  padding: 0 28px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 16px rgba(9,72,88,.25);
}

.header-inner { max-width: 960px; margin: 0 auto; padding: 16px 0 0; min-width: 0; }

.header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }

h1 { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: -.3px; }

.header-badge {
  font-size: 11px; font-weight: 500;
  background: rgba(255,255,255,.15); color: rgba(255,255,255,.85);
  padding: 3px 10px; border-radius: 20px; letter-spacing: .2px;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  margin-bottom: 14px;
  min-width: 0;
}
@media (max-width: 780px) {
  .stats-grid {
    grid-template-columns: repeat(2, 1fr);
  }
  .stat:last-child {
    grid-column: 1 / -1;
  }
  .stat-val { font-size: 20px; }
  header { padding: 0 14px; }
  .header-inner { padding: 12px 0 0; }
  h1 { font-size: 16px; }
  .header-badge { font-size: 10px; padding: 2px 8px; }
  #sync-status { font-size: 10px; }
  .main { padding: 14px 14px 60px; }

  /* Vak header: naam links, huidig + eindstand rechts uitgelijnd, vaste breedte */
  .vak-header {
    display: grid;
    grid-template-columns: 1fr 56px 56px 16px;
    gap: 6px;
    padding: 12px 14px;
    align-items: center;
  }
  .badges { display: none; }
  .gem-block { text-align: right; min-width: 0; }
  .gem-val { font-size: 20px; letter-spacing: -0.5px; }
  .gem-label { font-size: 9px; }
  .vak-naam { font-size: 14px; }
  .vak-meta { font-size: 10px; }
  .invoer-grid { grid-template-columns: 1fr 1fr; }
}

.stat {
  background: rgba(255,255,255,.10);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: var(--r-sm);
  padding: 9px 11px;
  transition: border-color .3s;
}

.stat-label { font-size: 9px; font-weight: 500; color: rgba(255,255,255,.55); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 4px; }

.stat-val { font-size: 21px; font-weight: 700; line-height: 1; color: #fff; transition: color .3s; }
.stat-val.ok   { color: #6ee7b7; }
.stat-val.warn { color: #fcd34d; }
.stat-val.fail { color: #fca5a5; }

.main { max-width: 960px; margin: 0 auto; padding: 24px 28px 60px; }

.section-title {
  font-size: 10px; font-weight: 700; letter-spacing: .8px;
  text-transform: uppercase; color: var(--text3);
  margin: 28px 0 10px;
  display: flex; align-items: center; gap: 10px;
}
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.vak-card {
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--r); margin-bottom: 8px;
  box-shadow: var(--shadow-sm); overflow: hidden;
  transition: box-shadow .2s, border-color .2s;
}
.vak-card:hover { box-shadow: var(--shadow); border-color: var(--border2); }
.vak-card.prioriteit   { border-left: 4px solid var(--petrol); }
.vak-card.gevaar       { border-left: 4px solid var(--red); }
.vak-card.waarschuwing { border-left: 4px solid var(--amber); }
.vak-card.goed         { border-left: 4px solid var(--green); }

.vak-header {
  display: grid;
  grid-template-columns: 1fr auto auto auto auto;
  align-items: center; gap: 16px; padding: 14px 18px;
  cursor: pointer; user-select: none;
}

.vak-naam { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -.1px; }
.vak-meta { font-size: 11px; font-weight: 400; color: var(--text3); margin-top: 2px; }

.badges { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }

.badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; white-space: nowrap; letter-spacing: .2px; }
.badge.tekort    { background: var(--red-lt);   color: var(--red); }
.badge.voldoende { background: var(--green-lt); color: var(--green); }
.badge.eis       { background: var(--teal-lt);  color: var(--petrol); }
.badge.eis.ok    { background: var(--green-lt); color: var(--green); }
.badge.onmogelijk{ background: var(--red-lt);   color: var(--red); border: 1px solid var(--red-mid); }

.gem-block { text-align: right; }
.gem-label { font-size: 10px; font-weight: 500; color: var(--text3); letter-spacing: .3px; text-transform: uppercase; margin-bottom: 2px; }
.gem-val { font-size: 22px; font-weight: 700; line-height: 1; transition: color .25s; letter-spacing: -.5px; }
.gem-val.groen  { color: var(--green); }
.gem-val.oranje { color: var(--amber); }
.gem-val.rood   { color: var(--red); }
.gem-val.grijs  { color: var(--text3); }

.chevron { color: var(--text3); font-size: 12px; transition: transform .2s; }
.chevron.open { transform: rotate(180deg); }

.progress-bar { height: 3px; background: var(--bg2); overflow: hidden; }
.progress-fill { height: 100%; transition: width .5s cubic-bezier(.4,0,.2,1), background .3s; }

.vak-body { display: none; border-top: 1px solid var(--border); background: var(--surface2); }
.vak-body.open { display: block; }
.body-inner { padding: 16px 18px 18px; }

.sub-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; color: var(--text3); margin: 0 0 8px; }

.cijfer-tabel { width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: 13px; }
.cijfer-tabel td { padding: 6px 0; border-bottom: 1px solid var(--border); }
.cijfer-tabel tr:last-child td { border-bottom: none; }
.cn { color: var(--text2); }
.cn.inhalen { color: var(--amber); font-weight: 500; }
.cw { color: var(--text3); font-size: 11px; text-align: center; width: 36px; }
.cv { font-weight: 600; text-align: right; width: 42px; }
.cv.laag   { color: var(--red); }
.cv.midden { color: var(--amber); }
.cv.hoog   { color: var(--green); }
.cv.miss   { color: var(--text3); font-weight: 400; font-style: italic; }

.invoer-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin-top: 4px; }

.invoer-card {
  background: var(--white); border: 1.5px solid var(--border);
  border-radius: var(--r-sm); padding: 12px 14px;
  transition: border-color .2s, box-shadow .2s;
}
.invoer-card:focus-within { border-color: var(--petrol); box-shadow: 0 0 0 3px var(--petrol-lt); }

.invoer-card-label { font-size: 11px; font-weight: 600; color: var(--text2); margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }

.itype { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; border-radius: 4px; font-size: 9px; font-weight: 700; }
.itype.inhalen   { background: var(--amber-lt); color: var(--amber); }
.itype.so        { background: var(--teal-lt);  color: var(--petrol); }
.itype.eindtoets { background: var(--petrol-lt);color: var(--petrol2); }

.invoer-row { display: flex; align-items: center; gap: 10px; }

.invoer-card input {
  width: 90px; background: var(--bg); border: 1.5px solid var(--border);
  border-radius: 8px; color: var(--text);
  font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 700;
  padding: 7px 10px; outline: none; transition: border-color .2s; letter-spacing: -.5px;
}
.invoer-card input:focus { border-color: var(--petrol); }
.invoer-card input::placeholder { color: var(--text3); font-size: 16px; font-weight: 400; }

.weging-chip { font-size: 11px; font-weight: 600; color: var(--text3); background: var(--bg2); padding: 3px 8px; border-radius: 20px; }

.effect-line { margin-top: 7px; font-size: 11px; font-weight: 500; padding: 4px 8px; border-radius: 6px; min-height: 24px; transition: all .2s; }
.effect-line.pos { background: var(--green-lt); color: var(--green); }
.effect-line.neg { background: var(--red-lt);   color: var(--red); }
.effect-line.neu { color: var(--text3); }

.nota-text { font-size: 11px; color: var(--text3); margin-top: 12px; padding: 8px 12px; background: var(--amber-lt); border-left: 3px solid var(--amber); border-radius: 0 var(--r-sm) var(--r-sm) 0; line-height: 1.5; }

.reset-btn { margin-top: 12px; font-size: 11px; font-weight: 500; color: var(--text3); background: none; border: 1px solid var(--border2); border-radius: 6px; padding: 4px 12px; cursor: pointer; font-family: 'Inter', sans-serif; transition: all .2s; }
.reset-btn:hover { background: var(--bg2); color: var(--text2); }

.herkans-blok { margin-top: 14px; padding: 12px 14px; background: #eef6ff; border-left: 3px solid #3b82f6; border-radius: 0 var(--r-sm) var(--r-sm) 0; }
.herkans-titel { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; color: #1d4ed8; margin-bottom: 8px; }
.herkans-item { font-size: 12px; color: #1e3a5f; line-height: 1.6; padding: 3px 0; display: flex; gap: 8px; align-items: flex-start; }
.herkans-item::before { content: '↺'; color: #3b82f6; font-size: 13px; flex-shrink: 0; line-height: 1.4; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-top">
      <h1>Daan — 2 havo</h1>
      <span class="header-badge">2,5 maand te gaan</span>
      <span id="sync-status" style="font-size:11px;font-weight:600;transition:color .3s;white-space:nowrap;"></span>
    </div>

</header>

<div class="main" id="main"></div>

    open:[
      {id:'so',   label:'Extra SO',  w:1, type:'so', opt:true},
      {id:'eind', label:'Eindtoets', w:3, type:'eindtoets'},
    ]
  },
];

const state = {};
VAKKEN.forEach(v => { state[v.id] = {}; v.open.forEach(o => state[v.id][o.id] = null); });

const gem = vak => {
  let p=0,w=0;
  vak.huidig.forEach(c => { if(c.w>0&&c.c!=null){p+=c.w*c.c;w+=c.w;} });
  vak.open.forEach(o => { const v=state[vak.id][o.id]; if(v!=null&&!isNaN(v)){p+=o.w*v;w+=o.w;} });
  return w?p/w:null;
};

const gemH = vak => {
  let p=0,w=0;
  vak.huidig.forEach(c => { if(c.w>0&&c.c!=null){p+=c.w*c.c;w+=c.w;} });
  return w?p/w:null;
};

const isTek = vak => { const g=gem(vak); return g!=null&&g<6; };
const kl = g => g==null?'grijs':g>=6?'groen':g>=5?'oranje':'rood';
const fmt = n => n==null||isNaN(n)?'—':n.toFixed(2).replace('.',',');
const ckl = c => c==null?'miss':c>=6?'hoog':c>=5?'midden':'laag';

const cardKl = vak => {
  if(vak.prio) return 'prioriteit';
  const g=gem(vak);
  return g==null?'':g>=6?'goed':g>=5?'waarschuwing':'gevaar';
};

function renderHeader() {
  const nt = VAKKEN.filter(v=>isTek(v)).length;
  const totTekort = VAKKEN.reduce((s,v) => {
    const g=gem(v);
    return s + (g!=null&&g<6.0 ? 6.0-g : 0);
  }, 0);
  const all = VAKKEN.map(v=>gem(v)).filter(g=>g!=null);
  const og = all.length ? all.reduce((a,b)=>a+b,0)/all.length : null;

  const gEl = document.getElementById('overall-gem');
  gEl.textContent = og!=null?og.toFixed(2).replace('.',','):'—';
  gEl.className = 'stat-val '+(og==null?'':og>=6?'ok':og>=5?'warn':'fail');

  const tEl = document.getElementById('overall-tekorten');
  tEl.textContent = '\u2212'+totTekort.toFixed(1).replace('.',',');
  tEl.className = 'stat-val fail';

  const nl=VAKKEN.find(v=>v.id==='nederlands'), wi=VAKKEN.find(v=>v.id==='wiskunde');
  const nlG=gem(nl), wiG=gem(wi);
  const nlOk=nlG!=null&&nlG>=5, wiOk=wiG!=null&&wiG>=5;

  const nlEl=document.getElementById('overall-nl');
  nlEl.textContent=fmt(nlG);
  nlEl.className='stat-val '+(nlG==null?'':nlOk?'ok':nlG>=4.5?'warn':'fail');

  document.getElementById('overall-wi').textContent=fmt(wiG);
  document.getElementById('overall-wi').className='stat-val fail';

  const bev=nt<=5&&nlOk&&wiOk;
  const bEl=document.getElementById('overall-bev');
  bEl.textContent=bev?'ja \u2713':'nee';
  bEl.className='stat-val '+(bev?'ok':'fail');
}

function renderVak(vak) {
  const g=gem(vak), gH=gemH(vak);
  const pct=g!=null?Math.min(100,(g/10)*100):0;
  const pc=g==null?'#dce6ea':g>=6?'#059669':g>=5?'#d97706':'#dc2626';

  let badges='';
  if(vak.maxH&&vak.maxH<5){
    badges+=`<span class="badge onmogelijk">eis onhaalbaar</span>`;
  } else if(vak.eis){
    const ok=g!=null&&g>=vak.eis;
    badges+=`<span class="badge eis${ok?' ok':''}">${ok?'\u2713 ':''}eis \u2265${vak.eis.toFixed(1).replace('.',',')}</span>`;
  }
  badges+=g!=null&&g<6?` <span class="badge tekort">tekort</span>`:g!=null?` <span class="badge voldoende">voldoende</span>`:'';

  const cijfersHtml=vak.huidig.map(c=>{
    const noot=c.noot?` <span style="font-size:10px;color:var(--text3);font-style:italic">(${c.noot})</span>`:'';
    return `<tr>
      <td class="cn${c.inh?' inhalen':''}">${c.naam}${noot}</td>
      <td class="cw">\xd7${c.w}</td>
      <td class="cv ${c.c==null?'miss':ckl(c.c)}">${c.c==null?'\u2014':c.c.toFixed(1).replace('.',',')}</td>
    </tr>`;
  }).join('');

  const typeLabel={inhalen:'\u21a9',so:'\u25ce',eindtoets:'\u25b6'};

  const invoerHtml=vak.open.map(o=>{
    const v=state[vak.id][o.id];
    const opt=o.opt?` <span style="font-size:10px;color:var(--text3);font-weight:400">(opt.)</span>`:'';
    return `<div class="invoer-card">
      <div class="invoer-card-label">
        <span class="itype ${o.type}">${typeLabel[o.type]||'\u25b6'}</span>
        ${o.label}${opt}
      </div>
      <div class="invoer-row">
        <input type="number" min="1" max="10" step="0.1" placeholder="\u2014"
               value="${v!=null?v:''}"
               data-vak="${vak.id}" data-open="${o.id}"
               oninput="handleInput(this)">
        <span class="weging-chip">\xd7${o.w}</span>
      </div>
      <div class="effect-line neu" id="ef-${vak.id}-${o.id}"></div>
    </div>`;
  }).join('');

  const hc=vak.huidig.filter(c=>c.w>0&&c.c!=null).length;
  const hw=vak.huidig.filter(c=>c.w>0&&c.c!=null).reduce((s,c)=>s+c.w,0);

  return `
  <div class="vak-card ${cardKl(vak)}" id="card-${vak.id}">
    <div class="vak-header" onclick="toggle('${vak.id}')">
      <div>
        <div class="vak-naam">${vak.naam}</div>
        <div class="vak-meta">${hc} cijfers \xb7 weging ${hw}</div>
      </div>
      <div class="badges">${badges}</div>
      <div class="gem-block"><div class="gem-label">huidig</div><div class="gem-val ${kl(gH)}">${fmt(gH)}</div></div>
      <div class="gem-block"><div class="gem-label">eindstand</div><div class="gem-val ${kl(g)}" id="ev-${vak.id}">${fmt(g)}</div></div>
      <div class="chevron" id="ch-${vak.id}">\u25bc</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="pr-${vak.id}" style="width:${pct}%;background:${pc}"></div></div>
    <div class="vak-body" id="body-${vak.id}">
      <div class="body-inner">
        <div class="sub-label">Bestaande cijfers</div>
        <table class="cijfer-tabel"><tbody>${cijfersHtml}</tbody></table>
        <div class="sub-label">In te vullen</div>
        <div class="invoer-grid">${invoerHtml}</div>
        ${vak.noot?`<div class="nota-text">${vak.noot}</div>`:''}
        ${vak.herkans&&vak.herkans.length?`
        <div class="herkans-blok">
          <div class="herkans-titel">Herkansingstip</div>
          ${vak.herkans.map(h=>`<div class="herkans-item">${h}</div>`).join('')}
        </div>`:''}
        <button class="reset-btn" onclick="resetVak('${vak.id}',event)">Wis invoer</button>
      </div>
    </div>
  </div>`;
}

function handleInput(el) {
  const vid=el.dataset.vak, oid=el.dataset.open;
  const val=el.value.trim()===''?null:parseFloat(el.value.replace(',','.'));
  if(val!=null&&(val<1||val>10))return;

  const prev=gem(VAKKEN.find(v=>v.id===vid));
  state[vid][oid]=val;
  const next=gem(VAKKEN.find(v=>v.id===vid));

  const ef=document.getElementById(`ef-${vid}-${oid}`);
  if(val!=null&&prev!=null&&next!=null){
    const d=next-prev,s=d>=0?'+':'';
    ef.textContent=`gem. ${s}${d.toFixed(2).replace('.',',')} \u2192 ${fmt(next)}`;
    ef.className='effect-line '+(d>0.005?'pos':d<-0.005?'neg':'neu');
  } else if(val!=null){
    ef.textContent=`gem. \u2192 ${fmt(next)}`; ef.className='effect-line neu';
  } else { ef.textContent=''; ef.className='effect-line neu'; }

  updateVak(vid);
  renderHeader();
}

function updateVak(vid) {
  const vak=VAKKEN.find(v=>v.id===vid), g=gem(vak);
  const pct=g!=null?Math.min(100,(g/10)*100):0;
  const pc=g==null?'#dce6ea':g>=6?'#059669':g>=5?'#d97706':'#dc2626';
  const el=document.getElementById(`ev-${vid}`);
  if(el){el.textContent=fmt(g);el.className='gem-val '+kl(g);}
  const pr=document.getElementById(`pr-${vid}`);
  if(pr){pr.style.width=pct+'%';pr.style.background=pc;}
  const cd=document.getElementById(`card-${vid}`);
  if(cd)cd.className='vak-card '+cardKl(vak);
}

function toggle(id){
  document.getElementById(`body-${id}`).classList.toggle('open');
  document.getElementById(`ch-${id}`).classList.toggle('open');
}

function resetVak(id,e){
  e.stopPropagation();
  Object.keys(state[id]).forEach(k=>state[id][k]=null);
  document.querySelectorAll(`input[data-vak="${id}"]`).forEach(el=>el.value='');
  document.querySelectorAll(`[id^="ef-${id}"]`).forEach(el=>{el.textContent='';el.className='effect-line neu';});
  updateVak(id); renderHeader();
}

function render(){
  const main=document.getElementById('main');
  const prio =VAKKEN.filter(v=>v.prio);
  const onred=VAKKEN.filter(v=>!v.prio&&['duits','natuurkunde'].includes(v.id));
  const aand =VAKKEN.filter(v=>!v.prio&&!onred.includes(v)&&gemH(v)<6);
  const goed =VAKKEN.filter(v=>!v.prio&&!onred.includes(v)&&gemH(v)>=6);

  let html='';
  html+=`<div class="section-title">Prioriteit \u2014 minimumeis geldt</div>`;
  prio.forEach(v=>html+=renderVak(v));
  html+=`<div class="section-title">Onredbaar \u2014 zo hoog mogelijk scoren</div>`;
  onred.forEach(v=>html+=renderVak(v));
  html+=`<div class="section-title">Haalbaar \u2014 inzet vereist</div>`;
  aand.forEach(v=>html+=renderVak(v));
  html+=`<div class="section-title">Goed \u2014 niet laten zakken</div>`;
  goed.forEach(v=>html+=renderVak(v));

  main.innerHTML=html;
  renderHeader();

  // alle vakken starten ingeklapt
}

render();

// Maak state en functies globaal beschikbaar voor Firebase module
window._state = state;
window._updateVak = updateVak;
window._renderHeader = renderHeader;
</script>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js';
import { getFirestore, doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCYcKgU305Mu0awy2Ebt6Cof51AF_qditY",
  authDomain: "daan---cijfers.firebaseapp.com",
  projectId: "daan---cijfers",
  storageBucket: "daan---cijfers.firebasestorage.app",
  messagingSenderId: "461221839832",
  appId: "1:461221839832:web:7d1cf7000565ce0a8be8ad"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const REF = doc(db, 'cijfers', 'daan');

function setSyncStatus(status) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  const map = {
    laden:      { text: 'laden…',       color: '#fcd34d' },
    opgeslagen: { text: '✓ opgeslagen', color: '#6ee7b7' },
    fout:       { text: '⚠ sync fout',  color: '#fca5a5' },
    '':         { text: '',                  color: 'transparent' },
  };
  const s = map[status] || map[''];
  el.textContent = s.text;
  el.style.color = s.color;
}

async function saveState() {
  try {
    const flat = {};
    Object.entries(window._state).forEach(([vakId, veld]) => {
      Object.entries(veld).forEach(([openId, val]) => {
        flat[vakId + '__' + openId] = val === null ? '__null__' : val;
      });
    });
    await setDoc(REF, flat);
    setSyncStatus('opgeslagen');
    setTimeout(() => setSyncStatus(''), 2500);
  } catch(e) {
    console.error(e);
    setSyncStatus('fout');
  }
}

async function loadState() {
  setSyncStatus('laden');
  try {
    const snap = await getDoc(REF);
    if (snap.exists()) {
      const flat = snap.data();
      Object.entries(flat).forEach(([key, val]) => {
        const parts = key.split('__');
        const vakId = parts[0], openId = parts[1];
        if (window._state[vakId] !== undefined) {
          window._state[vakId][openId] = val === '__null__' ? null : val;
        }
      });
      // Vul inputs in en herbereken
      Object.keys(window._state).forEach(vakId => {
        Object.entries(window._state[vakId]).forEach(([openId, val]) => {
          const input = document.querySelector('input[data-vak="' + vakId + '"][data-open="' + openId + '"]');
          if (input && val !== null) input.value = val;
        });
        window._updateVak(vakId);
      });
      window._renderHeader();
    }
    setSyncStatus('opgeslagen');
    setTimeout(() => setSyncStatus(''), 2500);
  } catch(e) {
    console.error(e);
    setSyncStatus('fout');
  }
}

// Patch handleInput en resetVak zodat ze ook opslaan
const origHandle = window.handleInput;
window.handleInput = function(el) { origHandle(el); saveState(); };

const origReset = window.resetVak;
window.resetVak = function(id, e) { origReset(id, e); saveState(); };

loadState();
</script>
